<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZenXR ⛩️ — Il tuo giardino zen in Mixed Reality</title>

  <!--
    ================================================================
    ZenXR — Entry Point HTML (Fase 1: Infrastruttura di Base)
    ================================================================
    Architettura AI-Friendly (vedi GDD §7):
      - Nessun bundler (Vite/Webpack). Risoluzione dipendenze via
        Import Maps native + moduli ES6 locali.
      - Nessun framework UI. Solo Vanilla JS (ES6+).
    Le dipendenze sono servite da CDN (jsdelivr / esm.sh) e mappate
    qui sotto a nomi "bare" (es. "three"), così i moduli in /src
    possono usare import puliti:  import * as THREE from 'three';
    Compatibile con qualsiasi server statico (es. Live Server).
    ================================================================
  -->

  <!--
    Import Map: mappa i nomi delle dipendenze alle rispettive URL ESM.
    IMPORTANTE: deve precedere qualsiasi <script type="module">.

    Scelta motore fisico: RAPIER (@dimforge/rapier3d-compat).
    Motivazione: build "compat" con WASM incorporato (base64), quindi
    caricabile via CDN/Import Map senza configurazione WASM aggiuntiva
    e senza bundler. Adatto alla "gravità addolcita" e allo Stone
    Balancing del GDD (§3, Fase 6), performante su chip mobile Quest 3.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "rapier": "https://esm.sh/@dimforge/rapier3d-compat@0.12.0",
      "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.3/dist/tween.esm.js",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.js"
    }
  }
  </script>

  <style>
    /* Stile minimale di base: nessun framework CSS/UI (vincolo GDD §7). */
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0f0e;
      color: #e8e4dc;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    /* Il canvas WebGL verrà agganciato qui nelle fasi successive. */
    #app {
      position: fixed;
      inset: 0;
      display: block;
    }
    /* Overlay di avvio temporaneo (verrà sostituito dal bottone XR). */
    #boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
    #boot h1 {
      font-weight: 600;
      letter-spacing: 0.04em;
      margin: 0;
    }
    #boot p {
      opacity: 0.6;
      margin: 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- Contenitore per il renderer WebGL (popolato dal SceneManager in Fase 2). -->
  <div id="app"></div>

  <!-- Overlay temporaneo di verifica infrastruttura (Fase 1). -->
  <div id="boot">
    <h1>ZenXR ⛩️</h1>
    <p>Inizializzazione infrastruttura…</p>
  </div>

  <!--
    Entry point dell'applicazione (modulo ES6).
    Da qui in poi tutta la logica risiede in moduli sotto /src,
    caricati dinamicamente rispettando il Single Responsibility Principle.
  -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
